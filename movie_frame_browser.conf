# Movie Frame Browser - Nginx 配置片段
# 
# 使用方式:
# 1. 在主 nginx.conf 的 http {} 块中添加: include /etc/nginx/sites-available/movie_frame_browser;
# 2. 或者创建软链接: ln -s /etc/nginx/sites-available/movie_frame_browser /etc/nginx/sites-enabled/
# 3. 测试配置: sudo nginx -t
# 4. 重载nginx: sudo systemctl reload nginx

# ============================================
# 前端静态文件
# ============================================

location ^~/movie/ {
    alias /home/chenkh/workspace/movie_frame_browser/frontend/dist/;
    auth_basic off;    
    # SPA 路由支持
    try_files $uri $uri/ /movie/index.html;
    
    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;
    
    # 访问日志
    #access_log /var/log/nginx/movie-frame-access.log;
    #error_log /var/log/nginx/movie-frame-error.log;
}

# ============================================
# API 反代
# ============================================

location ^~/movie/api/ {
    proxy_pass http://127.0.0.1:60008/api/;
    auth_basic off;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    # 流式 TS 分片：关闭缓冲，收到后端字节立即转发给 hls.js
    proxy_buffering off;
    proxy_request_buffering off;

    # ffmpeg seek + 启动可能耗时，放宽超时（HLS segment 生成是流式）
    proxy_connect_timeout 60s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    # 禁用缓存
    proxy_cache off;
}

# ============================================
# 静态资源 - 封面图
# ============================================

location ^~/movie/static/covers/ {
    alias /home/chenkh/workspace/movie_frame_browser/static/covers/;
    
    auth_basic off; 
    expires 30d;
    add_header Cache-Control "public, immutable";
    
    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
    }
}

# ============================================
# 静态资源 - 帧图
# ============================================

location ^~/movie/static/frames/ {
    alias /home/chenkh/workspace/movie_frame_browser/static/frames/;
    
    auth_basic off; 
    expires 30d;
    add_header Cache-Control "public, immutable";
    
    location ~ /\. {
        deny all;
    }
}

# ============================================
# 静态资源 - 预览片段
# ============================================

location ^~/movie/static/clips/ {
    alias /home/chenkh/workspace/movie_frame_browser/static/clips/;
    
    auth_basic off; 
    expires 7d;
    add_header Cache-Control "public, immutable";
    
    location ~ /\. {
        deny all;
    }
}

# ============================================
# 临时文件上传目录
# ============================================

location ^~/movie/static/temp/ {
    alias /home/chenkh/workspace/movie_frame_browser/static/temp/;
    
    auth_basic off; 
    # 开发/调试用，生产环境可注释
    expires -1;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    
    location ~ /\. {
        deny all;
    }
}

# ============================================
# 全局限制
# ============================================

