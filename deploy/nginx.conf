# Movie Frame Browser - Nginx 配置片段
# 
# 使用方式:
# 1. 在主 nginx.conf 的 http {} 块中添加: include /etc/nginx/sites-available/movie-frame-browser;
# 2. 或者创建软链接: ln -s /etc/nginx/sites-available/movie-frame-browser /etc/nginx/sites-enabled/
# 3. 测试配置: sudo nginx -t
# 4. 重载nginx: sudo systemctl reload nginx

# ============================================
# Upstream 后端服务
# ============================================

upstream movie_backend {
    server 127.0.0.1:8080;
    keepalive 32;
}

# ============================================
# 前端静态文件
# ============================================

location /movie/ {
    alias /var/www/movie-frame-browser/dist/;
    
    # SPA 路由支持
    try_files $uri $uri/ /movie/index.html;
    
    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;
    
    # 访问日志
    access_log /var/log/nginx/movie-frame-access.log;
    error_log /var/log/nginx/movie-frame-error.log;
}

# ============================================
# API 反代 (兼容前端 /api 路径)
# 如果你同时需要 /movie/api/ 前缀，请保留 /movie/api/ 块
# ============================================

location /api/ {
    proxy_pass http://movie_backend/;
    
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    proxy_cache off;
}

# ============================================
# 静态资源 - 封面图
# ============================================

location /movie/static/covers/ {
    alias /opt/movie-frame-browser/static/covers/;
    
    expires 30d;
    add_header Cache-Control "public, immutable";
    
    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
    }
}

# ============================================
# 静态资源 - 帧图
# ============================================

location /movie/static/frames/ {
    alias /opt/movie-frame-browser/static/frames/;
    
    expires 30d;
    add_header Cache-Control "public, immutable";
    
    location ~ /\. {
        deny all;
    }
}

# ============================================
# 静态资源 - 预览片段 (MP4)
# ============================================

location /movie/static/clips/ {
    alias /opt/movie-frame-browser/static/clips/;

    expires 7d;
    add_header Cache-Control "public, immutable";

    location ~ /\. {
        deny all;
    }
}

# ============================================
# FFmpeg 临时目录
# ============================================

location /movie/static/temp/ {
    alias /opt/movie-frame-browser/static/temp/;
    
    # 开发/调试用，生产环境可注释
    expires -1;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    
    location ~ /\. {
        deny all;
    }
}

# ============================================
# 全局限制
# ============================================

# 上传文件大小限制 (50G)
client_max_body_size 50G;

# 请求超时
client_body_timeout 300s;
client_header_timeout 60s;